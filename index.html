
  <!DOCTYPE html>
  <html lang="es">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/x-icon" href="/favicon.ico" />

      <!-- ─── Preconnects — reduce font latency ─── -->
      <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
      <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="preconnect" href="https://digio.es" crossorigin />

      <!-- ─── Preload critical fonts ─── -->
      <link
        rel="preload"
        href="https://digio.es/themes/digio/fonts/GT-Ultra-Median-Bold.woff2"
        as="font"
        type="font/woff2"
        crossorigin
      />
      <link rel="preload" href="/fonts/manrope-600.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="preload" href="/fonts/manrope-700.woff2" as="font" type="font/woff2" crossorigin />

      <!-- ─── Primary SEO ─── -->
      <title>Digio — Digital is our code</title>
      <meta name="description" content="Digio es un estudio digital especializado en diseño, desarrollo web y móvil, Cloud & DevOps y consultoría tecnológica. Transformamos ideas en productos digitales." />
      <link rel="canonical" href="https://digio.es" />

      <!-- ─── Open Graph ─── -->
      <meta property="og:type" content="website" />
      <meta property="og:site_name" content="Digio" />
      <meta property="og:title" content="Digio — Digital is our code" />
      <meta property="og:description" content="Estudio digital especializado en diseño, desarrollo web y móvil, Cloud & DevOps y consultoría tecnológica." />
      <meta property="og:url" content="https://digio.es" />
      <meta property="og:image" content="https://digio.es/og-image.jpg" />

      <!-- ─── Twitter Card ─── -->
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:title" content="Digio — Digital is our code" />
      <meta name="twitter:description" content="Estudio digital especializado en diseño, desarrollo web y móvil, Cloud & DevOps y consultoría tecnológica." />
      <meta name="twitter:image" content="https://digio.es/og-image.jpg" />
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
